    28.1%, 56.1% { stroke-dashoffset: 0; }
    56.2%, 100% { stroke-dashoffset: 3339; }
}
svg.acjk #stroke-p2 { animation-name: zk2; }
/* Stroke 3: Starts at 28.1%, finishes at 42.1%, holds until 56.1% */
@keyframes zk3 {
    0%, 28.1% { stroke-dashoffset: 3339; }
    42.1%, 56.1% { stroke-dashoffset: 0; }
    56.2%, 100% { stroke-dashoffset: 3339; }
}
svg.acjk #stroke-p3 { animation-name: zk3; }
/* Stroke 4: Starts at 42.1%, finishes at 56.1%, holds until 56.1% */
@keyframes zk4 {
    0%, 42.1% { stroke-dashoffset: 3339; }
    56.1%, 56.1% { stroke-dashoffset: 0; }
    56.2%, 100% { stroke-dashoffset: 3339; }
}
svg.acjk #stroke-p4 { animation-name: zk4; }
]]>
</style>
