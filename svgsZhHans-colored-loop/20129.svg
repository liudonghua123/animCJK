    0%, 32.7% { stroke-dashoffset: 3339; }
    49.0%, 49.0% { stroke-dashoffset: 0; }
    49.1%, 100% { stroke-dashoffset: 3339; }
}
svg.acjk #stroke-p3 { animation-name: zk3; }
]]>
