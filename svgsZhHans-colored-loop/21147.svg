<style>
<![CDATA[
svg.acjk path[clip-path] {
    animation-duration: 4.1s;
    animation-timing-function: linear;
    animation-iteration-count: infinite;
    stroke-dasharray: 3337;
    stroke-dashoffset: 3339;
    stroke-width: 128;
    stroke-linecap: round;
    fill: none;
    stroke: #FF4444;
}
