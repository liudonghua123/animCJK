    19.5%, 39.0% { stroke-dashoffset: 0; }
    39.1%, 100% { stroke-dashoffset: 3339; }
}
svg.acjk #stroke-p1 { animation-name: zk1; }
/* Stroke 2: Starts at 19.5%, finishes at 39.0%, holds until 39.0% */
@keyframes zk2 {
    0%, 19.5% { stroke-dashoffset: 3339; }
    39.0%, 39.0% { stroke-dashoffset: 0; }
    39.1%, 100% { stroke-dashoffset: 3339; }
}
svg.acjk #stroke-p2 { animation-name: zk2; }
]]>
